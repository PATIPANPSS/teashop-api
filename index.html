<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบเมนูร้านชา (Frontend)</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        padding: 20px;
      }
      .menu-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
      }
      .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 250px;
        padding: 15px;
        text-align: center;
      }
      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
      }
      .price {
        color: #e74c3c;
        font-size: 1.2rem;
        font-weight: bold;
      }
      button {
        margin-top: 10px;
        padding: 10px;
        background: #2ecc71;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
      }
      hr {
        margin: 40px 0;
        border: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">เมนูเครื่องดื่มทั้งหมด</h1>
    <div class="menu-container" id="menu-list">
      <p>กำลังโหลดข้อมูล...</p>
    </div>

    <hr />
    <h2 style="text-align: center">ประวัติยอดขาย</h2>

    <div
      style="
        max-width: 800px;
        border: 1px solid #333;
        margin: auto;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      "
    >
      <table style="width: 100%; border-collapse: collapse; text-align: left">
        <thead>
          <tr style="border-bottom: 2px solid #ddd; background-color: #f8f9fa">
            <th style="padding: 12px">เวลาที่ซื้อ</th>
            <th style="padding: 12px">ชื่อเมนู</th>
            <th style="padding: 12px">จำนวน</th>
            <th style="padding: 12px">ยอดรวม</th>
          </tr>
        </thead>
        <tbody id="sales-history">
          <tr>
            <td colspan="4" style="text-align: center; padding: 20px">
              กำลังโหลดข้อมูล...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const BACKEND_URL = "http://localhost:3000/api/drinks";
      const UPLOAD_URL = "http://localhost:3000/uploads";

      async function fetchDrinks() {
        try {
          const response = await fetch(`${BACKEND_URL}/`);
          const drinks = await response.json();

          const menuList = document.getElementById("menu-list");
          menuList.innerHTML = "";

          drinks.forEach((drink) => {
            const imageUrl = drink.image
              ? `${UPLOAD_URL}/${drink.image}`
              : "https://placehold.co/250x200";

            const card = `
                        <div class="card">
                            <img src="${imageUrl}" alt="${drink.name}">
                            <h3>${drink.name}</h3>
                            <p class="price">฿${drink.price}</p>
                            <p>คงเหลือ: ${drink.quantity}</p>
                            <button onclick="buyItem(${drink.id})">สั่งซื้อเลย</button>
                        </div>
                    `;
            menuList.innerHTML += card;
          });
        } catch (error) {
          console.error("ดึงข้อมูลไม่สำเร็จ:", error);
          document.getElementById("menu-list").innerHTML =
            '<p style="color:red">ไม่สามารถเชื่อมต่อ Backend ได้</p>';
        }
      }

      async function buyItem(id) {
        try {
          const response = await fetch(`${BACKEND_URL}/${id}/buy`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ quantity: 1 }),
          });

          const result = await response.json();

          if (response.ok) {
            alert(
              `${result.message}\nเมนู: ${result.receipt.menu}\nราคารวม: ฿${result.receipt.totalPrice}`,
            );

            fetchDrinks();
            fetchHistory();
          } else {
            alert(`สั่งซื้อไม่สำเร็จ: ${result.message || result.error}`);
          }
        } catch (error) {
          console.error("ระบบขัดข้อง:", error);
        }
      }

      async function fetchHistory() {
        try {
          const response = await fetch(
            `http://localhost:3000/api/drinks/sales/history`,
          );
          const result = await response.json();

          const tableBody = document.getElementById("sales-history");
          tableBody.innerHTML = "";

          if (result.sales && result.sales.length > 0) {
            result.sales.forEach((order) => {
              const date = new Date(order.created_at).toLocaleString("th-TH");

              const row = `
                <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 12px;">${date}</td>
                                <td style="padding: 12px; font-weight: bold;">${order.menu_name}</td>
                                <td style="padding: 12px;">${order.amount}</td>
                                <td style="padding: 12px; color: #27ae60; font-weight: bold;">฿${order.total_price}</td>
                            </tr>
              `;
              tableBody.innerHTML += row;
            });
          } else {
            tableBody.innerHTML =
              '<tr><td colspan="4" style="text-align: center; padding: 20px;">ยังไม่มีประวัติการขายครับ</td></tr>';
          }
        } catch (error) {
          console.error("ดึงข้อมูลล้มเหลว", error);
        }
      }
      fetchDrinks();
      fetchHistory();
    </script>
  </body>
</html>
